general = {
  name = "Playbar";          // name that appears in Apple Music / AirPlay picker
  output_backend = "pipe";
  ignore_volume_control = "yes";  // PCM stays at full scale; Sonos hardware handles volume
  run_this_when_volume_is_set = "/usr/local/bin/airplay-volume ";  // trailing space = arg
  active_state_timeout = 1;      // seconds of silence before declaring paused
  run_this_before_entering_active_state = "/usr/local/bin/airplay-active-start";
  run_this_after_exiting_active_state   = "/usr/local/bin/airplay-active-end";
};

pipe = {
  name = "/run/sonos-bridge/audio";
  output_format = "S32_LE";  // AirPlay 2 native format; use S16_LE for classic AirPlay
  output_rate = 48000;       // AirPlay 2 native rate; use 44100 for classic AirPlay
  audio_backend_latency_offset_in_seconds = -0.8;  // compensate for ffmpeg+HTTP+Sonos buffer
};

sessioncontrol = {
  run_this_before_play_begins = "/usr/local/bin/airplay-session-start";
  run_this_after_play_ends    = "/usr/local/bin/airplay-session-end";
  wait_for_completion         = "yes";  // block until start script returns before writing audio
};
